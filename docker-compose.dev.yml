version: '3.9'
services:
  relay-db:
    image: postgres:16
    environment:
      POSTGRES_DB: mystere_relay
      POSTGRES_USER: mystere
      POSTGRES_PASSWORD: devpassword
    ports: ["5432:5432"]
    volumes: ["relay-pgdata:/var/lib/postgresql/data"]

  custodian-db:
    image: postgres:16
    environment:
      POSTGRES_DB: mystere_custodian
      POSTGRES_USER: mystere
      POSTGRES_PASSWORD: devpassword
    ports: ["5433:5432"]
    volumes: ["custodian-pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  relay-pgdata:
  custodian-pgdata:
